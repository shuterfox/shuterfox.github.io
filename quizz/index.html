<!DOCTYPE html>
<html>

<head>
    <title>TV Receiver - Party Game</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        #room-code {
            font-size: 5em;
            color: #e94560;
            margin: 20px;
        }

        #answers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            font-size: 1.5em;
        }

        .card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #0f3460;
        }

        .dialogue-box {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 20px;
            background: #222;
            color: white;
            padding: 20px;
            border: 3px solid #555;
            font-family: 'Courier New', Courier, monospace;
        }

        .portrait {
            width: 100%;
            image-rendering: pixelated;
            /* Pour un look rétro Game Boy / NES */
        }

        .text-content {
            font-size: 1.2rem;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <h1>Rejoignez la partie</h1>
    <div id="room-code">CHARGEMENT...</div>
    <div id="status">En attente de joueurs...</div>
    <hr>
    <div id="dialogue-container" class="dialogue-box">
        <img id="character-portrait" src="portrait.png" alt="Character" class="portrait">
        <div id="dialogue-text" class="text-content"></div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        // Remplace par l'URL de ton serveur Render plus tard
        const socket = io('https://shuterfox-github-io.onrender.com');
        const codeDiv = document.getElementById('room-code');
        const answersDiv = document.getElementById('answers');

        context.start();

        socket.emit('CREATE_ROOM');

        socket.on('ROOM_CREATED', (code) => {
            codeDiv.innerText = code;
        });

        socket.on('PLAYER_JOINED', (name) => {
            document.getElementById('status').innerText = `${name} a rejoint !`;
        });

        socket.on('NEW_ANSWER', (data) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = data.text;
            answersDiv.appendChild(card);
        });

        socket.on('SHOW_DIALOG', (data) => {
            console.log(data);
            speak(data.text, 50);
        });

        async function speak(text, speed = 50) {
            const displayElement = document.getElementById('dialogue-text');
            displayElement.textContent = ""; // Reset du texte précédent

            for (const char of text) {
                displayElement.textContent += char;
                // On attend la résolution d'un setTimeout wrappé dans une Promise
                await new Promise(resolve => setTimeout(resolve, speed));
            }

            // Événement de fin pour déclencher la suite du gameplay
            displayElement.dispatchEvent(new CustomEvent('speechFinished'));
        }
    </script>
</body>

</html>
