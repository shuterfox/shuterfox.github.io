<!DOCTYPE html>
<html>

<head>
    <title>TV Receiver - Party Game</title>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="preload" as="image" href="background.webp">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* Empêche le scroll si le dialogue dépasse */

            /* Configuration de l'image */
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('background.webp');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;

            /* Flexbox pour s'assurer que le contenu reste bien structuré si besoin */
            display: flex;
            flex-direction: column;
        }

        #room-code {
            font-size: 5em;
            color: #e94560;
            margin: 20px;
        }

        #answers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            font-size: 1.5em;
        }

        .card {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #0f3460;
        }

        .dialogue-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            /* Centrage horizontal */
            width: 90%;
            max-width: 800px;
            z-index: 9999;
            /* S'assure d'être au-dessus de tout */

            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            background: rgba(0, 0, 0, 0.85);
            /* Semi-transparent pour le style */
            color: #00FF41;
            /* Vert "Matrix" pour la lisibilité */
            padding: 15px;
            border: 2px solid #00FF41;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .portrait {
            width: 100%;
            image-rendering: pixelated;
            /* Pour un look rétro Game Boy / NES */
        }

        .text-content {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .scene-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Définit la distance de l'observateur (ajuster entre 500px et 1500px) */
            perspective: 1000px;
            pointer-events: none;
            /* Laisse passer les clics si besoin */
        }

        #left-screen {
            position: absolute;
            top: 31.1%;
            left: 24.1%;
            width: 260px;
            height: 200px;


            /* Tes transformations à ajuster dans l'inspecteur */
            transform: rotateY(7deg) rotateX(-2deg) skewY(0deg);

            padding: 5px;
            pointer-events: auto;
            /* Permet d'interagir avec les éléments internes */
        }

        #right-screen {
            position: absolute;
            top: 16.9%;
            left: 56%;
            width: 504px;
            height: 380px;



            /* Tes transformations à ajuster dans l'inspecteur */
            transform: rotateY(-19deg) rotateX(0deg) skewY(0.5deg);

            padding: 5px;
            pointer-events: auto;
            /* Permet d'interagir avec les éléments internes */
        }
    </style>
</head>

<body>
    <div class="scene-3d">
        <div id="left-screen">
            <div id="room-code">CHARGEMENT...</div>
        </div>
        <div id="right-screen">
            <div id="status">En attente de joueurs...</div>
        </div>
    </div>

    <div id="dialogue-container" class="dialogue-box">
        <img id="character-portrait" src="portrait.webp" alt="Character" class="portrait">
        <div id="dialogue-text" class="text-content"></div>
    </div>

    <script>
        let currentDialogueSession = 0;

        const context = cast.framework.CastReceiverContext.getInstance();
        // Remplace par l'URL de ton serveur Render plus tard
        const socket = io('https://shuterfox-github-io.onrender.com');
        const codeDiv = document.getElementById('room-code');
        const answersDiv = document.getElementById('answers');

        context.start();

        socket.emit('CREATE_ROOM');

        socket.on('ROOM_CREATED', (code) => {
            codeDiv.innerText = code;
        });

        socket.on('PLAYER_JOINED', (name) => {
            document.getElementById('status').innerText = `${name} a rejoint !`;
        });

        socket.on('NEW_ANSWER', (data) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = data.text;
            answersDiv.appendChild(card);
        });

        socket.on('SHOW_DIALOG', (data) => {
            console.log(data);
            speak(data.text);
        });

        async function speak(text, speed = 40) {
            // On incrémente l'ID de session à chaque appel
            const sessionId = ++currentDialogueSession;

            const displayElement = document.getElementById('dialogue-text');
            displayElement.textContent = "";

            for (const char of text) {
                // Vérification : si une nouvelle session a commencé, on sort de la boucle
                if (sessionId !== currentDialogueSession) {
                    return;
                }

                displayElement.textContent += char;

                // On utilise un helper pour le délai
                await new Promise(resolve => setTimeout(resolve, speed));
            }
        }
    </script>
</body>

</html>
